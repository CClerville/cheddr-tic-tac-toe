name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint • typecheck • test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe29b1494e25e21f66cd3809cb8e93 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e2898f00c9aea85 # v4.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (turbo)
        run: pnpm turbo run build --filter='!@cheddr/mobile'

      - name: Test (turbo)
        run: pnpm turbo run test --filter='!@cheddr/mobile'

      - name: Mobile typecheck
        working-directory: apps/mobile
        run: pnpm tsc --noEmit
