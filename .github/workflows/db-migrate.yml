# PR-only: validate migration journal on every PR; apply versioned migrations
# to an ephemeral Neon branch when packages/db changes.
# Production migrations run in deploy.yml after merge to main.

name: DB migrations (PR)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: db-migrate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect db changes
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad70b929f482184f3753585 # v3.0.2
        id: filter
        with:
          filters: |
            db:
              - 'packages/db/**'
              - '.github/workflows/db-migrate.yml'

  validate:
    name: drizzle-kit check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # drizzle.config.ts requires DATABASE_URL to load; check does not connect.
      - name: Validate migrations
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
        run: pnpm --filter @cheddr/db db:check

  migrate-preview:
    name: Neon preview branch + migrate
    runs-on: ubuntu-latest
    needs: [changes, validate]
    if: needs.changes.outputs.db == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c # v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Run migrations (direct connection)
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm --filter @cheddr/db db:migrate:ci

      - name: Comment on PR
        uses: actions/github-script@60a0d83004c34cf0eec04e40dfb0b8facb87ee0f # v7.0.1
        with:
          script: |
            const host = `${{ steps.neon.outputs.db_host }}`;
            const branch = `preview/pr-${{ github.event.pull_request.number }}`;
            const body = [
              '### Neon preview DB',
              '',
              `- **Branch:** \`${branch}\``,
              `- **Host:** \`${host}\``,
              '',
              'Migrations applied with `drizzle-kit migrate` (direct / non-pooled URL).',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- neon-preview-db -->';
            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            const text = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: text,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: text,
              });
            }
