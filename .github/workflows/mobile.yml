# EAS Update previews on pull requests (main-branch mobile release lives in deploy.yml).
# Build runs without EXPO_TOKEN; publish is a separate job so PR checks still pass
# when OTA publish is skipped or awaits secrets.

name: Mobile (EAS preview)

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/api-types/**"
      - "packages/game-engine/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: mobile-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build workspace deps (no EAS token)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe29b1494e25e21f66cd3809cb8e93 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e2898f00c9aea85 # v4.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: pnpm turbo run build --filter='./packages/*'

  publish:
    name: EAS Update (PR)
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: eas-ota-preview
    steps:
      - uses: actions/checkout@11bd71901bbe29b1494e25e21f66cd3809cb8e93 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e2898f00c9aea85 # v4.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: pnpm turbo run build --filter='./packages/*'

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Publish preview update
        uses: expo/expo-github-action/preview@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          working-directory: apps/mobile
          command: >-
            eas update
            --branch pr-${{ github.event.pull_request.number }}
            --message "${{ github.sha }}"
            --non-interactive
        env:
          EAS_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
